<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>经典游戏合集 - 游戏大厅</title>
    <link rel="stylesheet" href="assets/css/common.css">
    <style>
        html, body { height: 100%; overflow: hidden; }
        .container { height: 100%; padding: 0; max-width: none; }
        .hall-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 12px;
        }
        .hall-header {
            flex-shrink: 0;
            width: 100%;
            text-align: center;
            padding: 20px 0 0;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            z-index: 10;
        }
        .hall-title {
            font-size: 2.2em;
            text-align: center;
            text-shadow: 0 0 20px rgba(0, 200, 255, 0.5);
            background: linear-gradient(90deg, #00d4ff, #c77dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        .hall-subtitle {
            color: #aaa;
            font-size: 1em;
            text-align: center;
            margin-bottom: 16px;
        }
        .games-grid {
            flex: 1;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 16px;
            width: 100%;
            max-width: 800px;
            padding: 0 12px 20px;
            min-height: 0;
        }
        .game-card {
            background: rgba(0, 212, 255, 0.08);
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 16px;
            padding: 20px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .game-card:hover {
            background: rgba(0, 212, 255, 0.2);
            border-color: #00d4ff;
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.2);
        }
        .game-card .icon {
            font-size: 2.5em;
        }
        .game-card .name {
            font-size: 0.95em;
            font-weight: bold;
            color: #00d4ff;
        }
        .game-card .desc {
            font-size: 0.75em;
            color: #888;
        }
        .footer-info {
            flex-shrink: 0;
            padding: 12px 0 20px;
            color: #666;
            font-size: 0.85em;
            text-align: center;
            width: 100%;
        }
        @media (max-width: 768px) {
            .hall-title { font-size: 1.6em; }
            .hall-header { padding-top: 12px; }
            .games-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .game-card { padding: 16px 8px; }
            .game-card .icon { font-size: 2em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hall-wrapper">
            <div class="hall-header">
                <h1 class="hall-title">🎮 经典游戏合集</h1>
                <p class="hall-subtitle">选择一款游戏开始挑战吧！</p>
            </div>
            <div class="games-grid">
                <a href="./sudoku.html" class="game-card">
                    <span class="icon">🔢</span>
                    <span class="name">数独</span>
                    <span class="desc">逻辑填数</span>
                </a>
                <a href="./snake.html" class="game-card">
                    <span class="icon">🐍</span>
                    <span class="name">贪吃蛇</span>
                    <span class="desc">经典街机</span>
                </a>
                <a href="./tetris.html" class="game-card">
                    <span class="icon">🧱</span>
                    <span class="name">俄罗斯方块</span>
                    <span class="desc">消除方块</span>
                </a>
                <a href="./minesweeper.html" class="game-card">
                    <span class="icon">💣</span>
                    <span class="name">扫雷</span>
                    <span class="desc">推理排雷</span>
                </a>
                <a href="./game2048.html" class="game-card">
                    <span class="icon">🎲</span>
                    <span class="name">2048</span>
                    <span class="desc">数字合并</span>
                </a>
                <a href="./gomoku.html" class="game-card">
                    <span class="icon">⚫</span>
                    <span class="name">五子棋</span>
                    <span class="desc">策略对战</span>
                </a>
                <a href="./breakout.html" class="game-card">
                    <span class="icon">🏓</span>
                    <span class="name">打砖块</span>
                    <span class="desc">弹球击碎</span>
                </a>
                <a href="./memory.html" class="game-card">
                    <span class="icon">🃏</span>
                    <span class="name">记忆翻牌</span>
                    <span class="desc">考验记忆</span>
                </a>
                <a href="./sokoban.html" class="game-card">
                    <span class="icon">📦</span>
                    <span class="name">推箱子</span>
                    <span class="desc">益智解谜</span>
                </a>
                <a href="./whackamole.html" class="game-card">
                    <span class="icon">🐹</span>
                    <span class="name">打地鼠</span>
                    <span class="desc">快速击打</span>
                </a>
                <a href="./flappybird.html" class="game-card">
                    <span class="icon">🐦</span>
                    <span class="name">飞翔的小鸟</span>
                    <span class="desc">飞越障碍</span>
                </a>
                <a href="./pinball.html" class="game-card">
                    <span class="icon">🎯</span>
                    <span class="name">见缝插针</span>
                    <span class="desc">精准时机</span>
                </a>
                <a href="./klotski.html" class="game-card">
                    <span class="icon">🏯</span>
                    <span class="name">华容道</span>
                    <span class="desc">滑块解谜</span>
                </a>
                <a href="./puzzle.html" class="game-card">
                    <span class="icon">🧩</span>
                    <span class="name">滑块拼图</span>
                    <span class="desc">拼图还原</span>
                </a>
            </div>
            <p class="footer-info">支持桌面端和移动端 | 点击游戏卡片开始游玩</p>
        </div>
    </div>
</body>
</html>
