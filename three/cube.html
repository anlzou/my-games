<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>旋转立方体 - 3D模型</title>
    <link rel="stylesheet" href="../assets/css/common.css">
    <link rel="stylesheet" href="../assets/css/three.css">
</head>
<body class="three-page">
    <div class="container">
        <div class="game-area" id="model-area">
            <div class="three-model-selector" id="model-selector"></div>
            <div class="three-container-wrap">
                <div id="three-container"></div>
            </div>
            <div class="three-info">
                🖱 拖拽旋转视角 | 滚轮缩放 | 支持触屏操作
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="../assets/js/common.js"></script>
    <script src="../assets/js/three/models.js"></script>
    <script src="../assets/js/three/cube.js"></script>
    <script>
        // 生成模型选择器按钮
        const modelSelector = document.getElementById('model-selector');
        if (modelSelector) {
            const models = [
                { id: 'cube', name: '旋转立方体', icon: '📦' },
                { id: 'sphere', name: '发光球体', icon: '🔮' },
                { id: 'torus', name: '扭结环', icon: '🔄' },
                { id: 'earth', name: '旋转地球', icon: '🌍' },
            ];
            models.forEach(m => {
                const a = document.createElement('a');
                a.href = `./${m.id}.html`;
                a.className = 'three-model-btn' + (m.id === 'cube' ? ' active' : '');
                a.textContent = `${m.icon} ${m.name}`;
                modelSelector.appendChild(a);
            });
        }
        initCommonLayout('three', 'models');
        document.title = '旋转立方体 - 3D模型';
        initCube();
    </script>
</body>
</html>
